<body>
  <!-- Rev178: botón Atrás visible cuando viene desde el visor mobile.
       UA-check para mostrarlo solo en móvil/tablet o cuando se navegó
       desde /signalk-mareas-ihm/mobile. Vuelve con history.back(). -->
  <!-- Rev187: header iOS-style con back+título centrado para TidesView embebido -->
  <div id="m-tv-header" style="display:none;position:fixed;top:0;left:0;right:0;height:64px;z-index:9999;background:rgba(10,30,50,.97);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,178,63,.3);align-items:center;justify-content:space-between;padding:0 12px">
    <button id="m-tv-back" type="button" onclick="if(history.length>1){history.back()}else{location.href='/signalk-mareas-ihm/visorfondeo'}" style="background:rgba(255,178,63,.15);border:1px solid #ffb23f;color:#ffb23f;font-size:18px;font-weight:800;padding:12px 18px;border-radius:12px;cursor:pointer;min-height:48px;display:flex;align-items:center;gap:4px"><span id="m-tv-back-txt">‹ Back</span></button>
    <div id="m-tv-title-txt" style="flex:1;text-align:center;font-size:22px;font-weight:900;color:#fff;letter-spacing:-.3px">🌊 Tides</div>
    <button id="m-tv-curvas" type="button" onclick="document.dispatchEvent(new CustomEvent('m-show-curvas'))" style="background:rgba(33,150,243,.18);border:1px solid #2196F3;color:#4dd0ff;font-size:16px;font-weight:800;padding:12px 16px;border-radius:12px;cursor:pointer;min-height:48px"><span id="m-tv-curvas-txt">📈 Curves</span></button>
  </div>
  <script>
  (function(){
    /* Rev320: i18n del header del iframe (m-tv-header). Detecta idioma vía
       URL ?lang= o localStorage 'ihm-visor-lang'. ES → Atrás/Mareas/Curvas. */
    var ua = navigator.userAgent || '';
    var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobile|Tablet/i.test(ua);
    var fromMobile = (document.referrer || '').indexOf('/signalk-mareas-ihm/mobile') >= 0;
    var fromVisor = (document.referrer || '').indexOf('/signalk-mareas-ihm/') >= 0;
    var header = document.getElementById('m-tv-header');
    if (header && (isMobile || fromMobile || fromVisor)) {
      header.style.display = 'flex';
      document.documentElement.style.paddingTop = '64px';
    }
    /* Detectar idioma */
    var lang = 'en';
    try {
      var qs = new URLSearchParams(window.location.search);
      if (qs.get('lang') === 'es') lang = 'es';
      else if (qs.get('lang') === 'en') lang = 'en';
      else {
        var ls = localStorage.getItem('ihm-visor-lang');
        if (ls === 'es' || ls === 'en') lang = ls;
      }
    } catch(_){}
    if (lang === 'es') {
      var bt = document.getElementById('m-tv-back-txt'); if (bt) bt.textContent = '‹ Atrás';
      var tt = document.getElementById('m-tv-title-txt'); if (tt) tt.textContent = '🌊 Mareas';
      var ct = document.getElementById('m-tv-curvas-txt'); if (ct) ct.textContent = '📈 Curvas';
    }
  })();
  </script>
  <div id="app"></div>
  <script>
  (function(){
    var ld=window.devicePixelRatio||1,bd=ld;
    if(window.outerWidth>0&&window.innerWidth>0){var iz=window.outerWidth/window.innerWidth;if(iz>1.05&&iz<5)bd=ld/iz;}
    function fix(){var d=window.devicePixelRatio||1,bz=d/bd,c=(Math.abs(bz-1)>0.05)?1/bz:1;document.documentElement.style.setProperty('--zoom-fix',c);}
    fix();window.addEventListener('resize',fix);
  })();
  </script>
</body>
