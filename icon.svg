<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="MAREAS (IHM)">
  <rect width="64" height="64" rx="14" fill="#04384a"/>

  <!-- Sea -->
  <path d="M6 42c8-9 18-13 30-13 10 0 18 4 22 9v14H6V42z" fill="#0b5d8a" opacity="0.98"/>
  <path d="M9 45c8-7 16-10 27-10 9 0 16 3 20 7" fill="none" stroke="#a7f1ff" stroke-width="3.4" stroke-linecap="round" opacity="0.88"/>

  <!-- Island + beach -->
