    <path d="M3 5 L18 5" stroke="#ffd166" stroke-width="2.6" stroke-linecap="round" opacity="0.65"/>
  </g>

  <!-- Small star (forces cache bust visually) -->
  <path d="M14 14l1.2 2.4 2.6.4-1.9 1.8.5 2.6-2.4-1.3-2.4 1.3.5-2.6-1.9-1.8 2.6-.4z" fill="#a7f1ff" opacity="0.75"/>
